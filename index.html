<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURAE CRYPTO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #121922; color: #ffffff; margin: 0; padding: 16px; text-align: center; }
        
        .screen { display: none; }
        .screen.active { display: block; }

        .logo-icon { font-size: 50px; margin-bottom: 10px; }
        .input-field { width: 100%; padding: 12px; margin: 6px 0; background: #1c2733; border: 1px solid #2b394a; border-radius: 10px; color: #fff; font-size: 14px; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 15px; color: #fff; background: #248bfa; cursor: pointer; margin-top: 8px; }
        .btn-outline { background: transparent; border: 1px solid #248bfa; color: #248bfa; }
        .btn-green { background: #2bc155; }
        .btn-danger { background: #e53935; }

        /* Wallet Header */
        .wallet-card { background: #1c2733; padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 15px; }
        .balance-title { color: #708499; font-size: 13px; }
        .balance-val { font-size: 28px; font-weight: 700; margin: 5px 0; }

        /* Crypto List */
        .crypto-item { display: flex; justify-content: space-between; align-items: center; background: #1c2733; padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
        .crypto-item:active { background: #2b394a; }

        /* Chart Modal */
        .chart-box { width: 100%; height: 130px; margin: 15px 0; }
        .chart-svg { width: 100%; height: 100%; }

        .time-buttons { display: flex; justify-content: space-between; background: #1c2733; padding: 4px; border-radius: 10px; margin-bottom: 15px; }
        .time-btn { background: transparent; border: none; color: #708499; padding: 6px 10px; font-weight: 600; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .time-btn.active { background: #2b394a; color: #ffffff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #1c2733; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: left; }
    </style>
</head>
<body>

    <!-- 1. BOSHILASH EKRANI -->
    <div id="welcome-screen" class="screen active">
        <div style="margin-top: 50px;">
            <div class="logo-icon">💎</div>
            <h2>TURAE CRYPTO</h2>
            <p style="color: #708499;">Xush kelibsiz! Kripto hamyoningizga kiring.</p>
            <button class="btn" onclick="showScreen('login-screen')">Kirish</button>
            <button class="btn btn-outline" onclick="showScreen('register-screen')">Ro'yxatdan o'tish</button>
        </div>
    </div>

    <!-- 2. KIRISH EKRANI -->
    <div id="login-screen" class="screen">
        <h3>Tizimga Kirish</h3>
        <input type="text" id="login-email" class="input-field" placeholder="Gmail">
        <input type="password" id="login-pass" class="input-field" placeholder="Parol">
        <button class="btn" onclick="handleLogin()">Kirish</button>
        <button class="btn btn-outline" onclick="showScreen('welcome-screen')">Orqaga</button>
    </div>

    <!-- 3. RO'YXATDAN O'TISH EKRANI -->
    <div id="register-screen" class="screen">
        <h3>Ro'yxatdan o'tish</h3>
        <input type="text" id="reg-name" class="input-field" placeholder="Ismingiz">
        <input type="email" id="reg-email" class="input-field" placeholder="Gmail manzilingiz">
        <input type="password" id="reg-pass" class="input-field" placeholder="Parol">
        <input type="password" id="reg-pass2" class="input-field" placeholder="Parolni takrorlang">
        <button class="btn btn-green" onclick="handleRegister()">Hisob yaratish</button>
        <button class="btn btn-outline" onclick="showScreen('welcome-screen')">Orqaga</button>
    </div>

    <!-- 4. ASOSIY HAMYON DASHBOARD -->
    <div id="main-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="user-greeting" style="font-weight: 600; color: #248bfa;"></span>
            <button onclick="logout()" style="background: none; border: none; color: #e53935; font-size: 12px;">Chiqish 🚪</button>
        </div>

        <div class="wallet-card">
            <div class="balance-title">Umumiy Balans</div>
            <div class="balance-val" id="total-balance">0.00 $</div>
            <button class="btn btn-green" style="padding: 8px; font-size: 13px;" onclick="openDepositModal()">+ Pul Kiritish (Deposit)</button>
        </div>

        <h4 style="text-align: left; margin: 15px 0 10px 0; color: #708499;">Kriptovalyutalar</h4>

        <!-- TON -->
        <div class="crypto-item" onclick="openCoinModal('TON', '1.53', '▲ +6.01%')">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="font-size: 24px;">💎</div>
                <div style="text-align: left;">
                    <div style="font-weight: 600;">Toncoin</div>
                    <div style="font-size: 12px; color: #2bc155;">▲ +6.01%</div>
                </div>
            </div>
            <div style="font-weight: 700;">1.53 $</div>
        </div>

        <!-- BTC -->
        <div class="crypto-item" onclick="openCoinModal('BTC', '65900', '▲ +2.15%')">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="font-size: 24px;">🟧</div>
                <div style="text-align: left;">
                    <div style="font-weight: 600;">Bitcoin</div>
                    <div style="font-size: 12px; color: #2bc155;">▲ +2.15%</div>
                </div>
            </div>
            <div style="font-weight: 700;">65,900 $</div>
        </div>

        <!-- ETH -->
        <div class="crypto-item" onclick="openCoinModal('ETH', '2640', '▼ -1.10%')">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="font-size: 24px;">🔷</div>
                <div style="text-align: left;">
                    <div style="font-weight: 600;">Ethereum</div>
                    <div style="font-size: 12px; color: #e53935;">▼ -1.10%</div>
                </div>
            </div>
            <div style="font-weight: 700;">2,640 $</div>
        </div>
    </div>

    <!-- 5. TANGA DIAGRAMMA MODALI -->
    <div id="coin-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-coin-title">Tanga</h3>
            <div id="modal-coin-price" style="font-size: 24px; font-weight: 700;">-- $</div>
            <div id="modal-coin-change" style="font-size: 13px; margin-bottom: 10px;">--</div>

            <div class="chart-box">
                <svg class="chart-svg" viewBox="0 0 500 150" preserveAspectRatio="none">
                    <path id="modal-chart-path" d="M 0,100 Q 150,20 250,80 T 500,30" fill="none" stroke="#2bc155" stroke-width="4" />
                </svg>
            </div>

            <div class="time-buttons">
                <button class="time-btn active" onclick="changeChart('1K', 'M 0,100 Q 150,20 250,80 T 500,30')">1K</button>
                <button class="time-btn" onclick="changeChart('1H', 'M 0,40 Q 100,120 300,50 T 500,100')">1H</button>
                <button class="time-btn" onclick="changeChart('1 Oy', 'M 0,130 Q 200,10 350,110 T 500,20')">1 Oy</button>
                <button class="time-btn" onclick="changeChart('1Y', 'M 0,20 Q 150,140 300,50 T 500,10')">1Y</button>
            </div>

            <button class="btn btn-outline" onclick="closeModal('coin-modal')">Yopish</button>
        </div>
    </div>

    <!-- 6. DEPOSIT (PUL KIRITISH) MODALI -->
    <div id="deposit-modal" class="modal">
        <div class="modal-content">
            <h3>Hamyonga Pul Tashlash</h3>
            <p style="font-size: 12px; color: #708499;">Masalan: 1$ yoki xohlagan summa kiriting</p>
            <input type="number" id="deposit-amount" class="input-field" placeholder="Summa kiritng ($)">
            <button class="btn btn-green" onclick="processDeposit()">Pulni Hisobga Tushirish</button>
            <button class="btn btn-outline" onclick="closeModal('deposit-modal')">Yopish</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Tizimni tekshirish (Localstorage)
        window.onload = function() {
            const activeUser = JSON.parse(localStorage.getItem('currentUser'));
            if(activeUser) {
                initDashboard(activeUser);
            }
        };

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Ro'yxatdan o'tish
        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const pass2 = document.getElementById('reg-pass2').value;

            if(!name || !email || !pass) { alert("Barcha maydonlarni to'ldiring!"); return; }
            if(pass !== pass2) { alert("Parollar mos kelmadi!"); return; }

            const userData = { name, email, pass, balance: 0.00 };
            localStorage.setItem('user_' + email, JSON.stringify(userData));
            localStorage.setItem('currentUser', JSON.stringify(userData));

            alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
            initDashboard(userData);
        }

        // Kirish
        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            const savedUser = JSON.parse(localStorage.getItem('user_' + email));

            if(savedUser && savedUser.pass === pass) {
                localStorage.setItem('currentUser', JSON.stringify(savedUser));
                initDashboard(savedUser);
            } else {
                alert("Gmail yoki parol noto'g'ri!");
            }
        }

        function initDashboard(user) {
            document.getElementById('user-greeting').innerText = "👤 " + user.name;
            document.getElementById('total-balance').innerText = user.balance.toFixed(2) + " $";
            showScreen('main-screen');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            showScreen('welcome-screen');
        }

        // Deposit (Pul tashlash)
        function openDepositModal() { document.getElementById('deposit-modal').style.display = 'flex'; }
        
        function processDeposit() {
            const amt = parseFloat(document.getElementById('deposit-amount').value);
            if(!amt || amt <= 0) { alert("Tog'ri summa kiriting!"); return; }

            let currentUser = JSON.parse(localStorage.getItem('currentUser'));
            currentUser.balance += amt;

            // Xotirani yangilash
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            localStorage.setItem('user_' + currentUser.email, JSON.stringify(currentUser));

            document.getElementById('total-balance').innerText = currentUser.balance.toFixed(2) + " $";
            alert(amt + "$ hamyoningizga tushdi!");
            closeModal('deposit-modal');
        }

        // Modalni boshqarish
        function openCoinModal(name, price, change) {
            document.getElementById('modal-coin-title').innerText = name;
            document.getElementById('modal-coin-price').innerText = price + " $";
            document.getElementById('modal-coin-change').innerText = change;
            document.getElementById('coin-modal').style.display = 'flex';
        }

        function changeChart(period, pathD) {
            document.getElementById('modal-chart-path').setAttribute('d', pathD);
        }

        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
    </script>
</body>
</html>
