<!<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURAE CRYPTO</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121922;
            color: #ffffff;
            margin: 0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .coin-icon {
            width: 44px;
            height: 44px;
            background: #248bfa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .coin-title {
            font-size: 18px;
            font-weight: 600;
        }
        .price {
            font-size: 32px;
            font-weight: 700;
            margin: 4px 0;
        }
        .change-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .up { color: #2bc155; }
        .down { color: #ff5959; }

        /* Vektorlik chiziqli grafik (SVG) */
        .chart-box {
            width: 100%;
            height: 150px;
            margin-bottom: 15px;
        }
        .chart-svg {
            width: 100%;
            height: 100%;
        }

        /* Taymer tugmalari */
        .time-buttons {
            display: flex;
            justify-content: space-between;
            background: #1c2733;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .time-btn {
            background: transparent;
            border: none;
            color: #708499;
            padding: 8px 12px;
            font-weight: 600;
            border-radius: 8px;
            font-size: 13px;
        }
        .time-btn.active {
            background: #2b394a;
            color: #ffffff;
        }

        /* Sotib olish / Sotish tugmalari */
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            background: #248bfa;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="coin-icon">💎</div>
        <div class="coin-title">Toncoin (TON)</div>
    </div>

    <!-- Narx va ko'tarilish/tushish -->
    <div class="price" id="current-price">...</div>
    <div class="change-tag">
        <span id="change-val" class="up">...</span>
        <span style="color: #708499;">Bugun</span>
    </div>

    <!-- Grafik qismi -->
    <div class="chart-box">
        <svg class="chart-svg" viewBox="0 0 500 150" preserveAspectRatio="none">
            <defs>
                <linearGradient id="gradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#2bc155" stop-opacity="0.4"/>
                    <stop offset="100%" stop-color="#2bc155" stop-opacity="0.0"/>
                </linearGradient>
            </defs>
            <path d="M 0,130 Q 100,20 200,70 T 400,30 L 500,50 L 500,150 L 0,150 Z" fill="url(#gradient)" />
            <path d="M 0,130 Q 100,20 200,70 T 400,30 L 500,50" fill="none" stroke="#2bc155" stroke-width="4" />
        </svg>
    </div>

    <!-- Vaqt oraliqlari -->
    <div class="time-buttons">
        <button class="time-btn active">1K</button>
        <button class="time-btn">1H</button>
        <button class="time-btn">1 Oy</button>
        <button class="time-btn">1Y</button>
        <button class="time-btn">All</button>
    </div>

    <!-- Tugmalar -->
    <div class="action-buttons">
        <button class="btn">Sotib olish</button>
        <button class="btn">Sotish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function loadPrice() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                const ton = data['the-open-network'];

                document.getElementById('current-price').innerText = ton.usd.toLocaleString() + ' $';
                
                const change = ton.usd_24h_change.toFixed(2);
                const changeEl = document.getElementById('change-val');

                if (change >= 0) {
                    changeEl.innerText = `▲ +${change}%`;
                    changeEl.className = 'up';
                } else {
                    changeEl.innerText = `▼ ${change}%`;
                    changeEl.className = 'down';
                }
            } catch (e) {
                document.getElementById('current-price').innerText = '1.55 $';
                document.getElementById('change-val').innerText = '▲ +2.45%';
            }
        }

        loadPrice();
    </script>
</body>
</html>
