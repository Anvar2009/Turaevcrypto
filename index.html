<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Mini App</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- TON Connect SDK (Hamyon ulash uchun) -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
        }
        #ton-connect {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h2>⚡️ Mening Kripto Mini App'im</h2>
    
    <div class="card">
        <p id="user-info">Yuklanmoqda...</p>
    </div>

    <!-- Hamyon tugmasi tushadigan joy -->
    <div id="ton-connect"></div>

    <script>
        // 1. Telegram WebApp faylini yoyish
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 2. Foydalanuvchi ismini chiqarish
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-info').innerText = 
                "Salom, " + tg.initDataUnsafe.user.first_name + "! 👋";
        } else {
            document.getElementById('user-info').innerText = "Salom, Mehmon!";
        }

        // 3. TON Hamyon ulash tizimi
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp/master/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
