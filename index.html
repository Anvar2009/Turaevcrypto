<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Auto-Poster</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h3 {
            text-align: center;
            color: #38bdf8;
            margin-top: 0;
        }
        label {
            font-size: 12px;
            color: #94a3b8;
            display: block;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-start { background-color: #0284c7; color: white; }
        .btn-stop { background-color: #ef4444; color: white; display: none; }
        #log {
            margin-top: 15px;
            font-size: 12px;
            background: #000;
            padding: 10px;
            border-radius: 6px;
            height: 100px;
            overflow-y: auto;
            color: #4ade80;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>💎 TON Auto-Poster</h3>
    
    <label>Bot Token:</label>
    <input type="text" id="token" placeholder="BotFather bergan token">

    <label>Kanal Username:</label>
    <input type="text" id="channel" placeholder="@kanalingiz_nomi">

    <button id="startBtn" class="btn-start" onclick="startPosting()">Boshlash 🚀</button>
    <button id="stopBtn" class="btn-stop" onclick="stopPosting()">To'xtatish 🛑</button>

    <div id="log">> Tayyor. Ma'lumotlarni kiriting.</div>
</div>

<script>
    let timer = null;

    function printLog(txt) {
        const logDiv = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += `<br>[${time}] ${txt}`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Telegram API'ga JSONP orqali xabar yuborish
    function sendToTelegram(token, channel, text) {
        const script = document.createElement('script');
        const encodedText = encodeURIComponent(text);
        script.src = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${channel}&text=${encodedText}&parse_mode=HTML&callback=onTelegramResponse`;
        
        // Oldingi eski scriptlarni o'chirish
        const oldScript = document.getElementById('tgScript');
        if(oldScript) oldScript.remove();
        
        script.id = 'tgScript';
        document.body.appendChild(script);
    }

    // Telegram'dan javob kelganda ishlaydi
    window.onTelegramResponse = function(response) {
        if(response.ok) {
            printLog("✅ Post kanalga muvaffaqiyatli tashlandi!");
        } else {
            printLog("❌ Xatolik: " + response.description);
        }
    };

    // Binance public API orqali TON narxini olish
    async function postTonPrice() {
        const token = document.getElementById('token').value.trim();
        const channel = document.getElementById('channel').value.trim();

        if (!token || !channel) {
            printLog("❌ Token yoki Kanal kiritilmadi!");
            stopPosting();
            return;
        }

        printLog("⌛ Narx olinmoqda...");

        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=TONUSDT');
            const data = await res.json();
            const price = parseFloat(data.price).toFixed(3);

            const msg = `💎 <b>TON Coin Narxi</b>\n\n💵 Hozirgi narx: <b>$${price} USD</b>\n\n⏰ <i>Har minutda yangilanadi</i>`;
            
            sendToTelegram(token, channel, msg);
        } catch (err) {
            printLog("❌ Narxni olishda xatolik yuz berdi!");
        }
    }

    function startPosting() {
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        
        printLog("🚀 Avto-post berish boshlandi!");
        postTonPrice(); // Birinchi marta darhol yuborish

        // Har 60000 ms (1 minut) da qaytaradi
        timer = setInterval(postTonPrice, 60000);
    }

    function stopPosting() {
        if (timer) clearInterval(timer);
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        printLog("🛑 To'xtatildi.");
    }
</script>

</body>
</html>
