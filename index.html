<script>
    // ----------------------------------------------------
    // TELEGRAM BOT SOZLAMALARI (O'zingiznikini kiriting)
    // ----------------------------------------------------
    const BOT_TOKEN = "7123456789:AAExxxxxxxxxxxxxxxxxxxxxx"; // BotFather'dan olingan token
    const CHAT_ID = "123456789"; // O'zingizning Telegram Chat ID'ingiz

    // TELEGRAMGA XABAR YUBORISH FUNKSIYASI
    function sendTelegramNotification(text) {
        if (BOT_TOKEN.includes("YOUR_") || CHAT_ID.includes("YOUR_")) return;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'HTML'
            })
        }).catch(err => console.error("Telegram xatosi:", err));
    }

    // EKRANLARNI ALMASHTIRISH
    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 1. RO'YXATDAN O'TISH
    function registerUser() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim().toLowerCase();
        const pass = document.getElementById('reg-pass').value;

        if(!name || !email || !pass) { alert("Barcha maydonlarni to'ldiring!"); return; }

        const user = { name, email, pass, balance: 0, role: 'user' };
        localStorage.setItem('u_' + email, JSON.stringify(user));
        localStorage.setItem('active_email', email);

        // Telegramga bildirishnoma yuborish
        const msg = `🆕 <b>Yangi foydalanuvchi!</b>\n👤 Ismi: ${name}\n📧 Email: ${email}`;
        sendTelegramNotification(msg);

        alert("Muvaffaqiyatli ro'yxatdan o'tdingiz!");
        loadApp(user);
    }

    // 2. TIZIMGA KIRISH (LOGIN)
    function loginUser() {
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const pass = document.getElementById('login-pass').value;

        if(email === "admin@crypto.uz" && pass === "admin123") {
            openScreen('admin-screen');
            return;
        }

        const saved = localStorage.getItem('u_' + email);
        if(!saved) { alert("Bunday Gmail topilmadi!"); return; }

        const user = JSON.parse(saved);
        if(user.pass === pass) {
            localStorage.setItem('active_email', email);

            // Telegramga bildirishnoma yuborish
            const msg = `🔑 <b>Tizimga kirish!</b>\n👤 Ismi: ${user.name}\n📧 Email: ${user.email}`;
            sendTelegramNotification(msg);

            loadApp(user);
        } else {
            alert("Parol noto'g'ri!");
        }
    }

    function loadApp(user) {
        document.getElementById('u-name').innerText = user.name;
        document.getElementById('u-email').innerText = user.email;
        document.getElementById('u-balance').innerText = user.balance.toFixed(2) + " $";
        openScreen('main-screen');
    }

    // 3. ADMIN PUL TASHLASHI
    function adminSendMoney() {
        const email = document.getElementById('adm-email').value.trim().toLowerCase();
        const amt = parseFloat(document.getElementById('adm-amount').value);

        if(!email || !amt || amt <= 0) { alert("To'g'ri ma'lumot kiriting!"); return; }

        const saved = localStorage.getItem('u_' + email);
        if(!saved) { alert("Bunday foydalanuvchi topilmadi!"); return; }

        let user = JSON.parse(saved);
        user.balance += amt;
        localStorage.setItem('u_' + email, JSON.stringify(user));

        // Telegram bildirishnoma
        sendTelegramNotification(`💰 <b>Admin pul tushirdi!</b>\n👤 Kimgadir: ${email}\n💵 Summa: ${amt}$`);

        alert(`${email} hisobiga ${amt}$ tushirildi!`);
        document.getElementById('adm-email').value = '';
        document.getElementById('adm-amount').value = '';
    }

    // 4. PUL O'TKAZMALARI
    function sendMoney() {
        const toEmail = document.getElementById('tr-email').value.trim().toLowerCase();
        const amt = parseFloat(document.getElementById('tr-amount').value);
        const myEmail = localStorage.getItem('active_email');

        if(!toEmail || !amt || amt <= 0) { alert("Ma'lumot xato!"); return; }
        if(toEmail === myEmail) { alert("O'zingizga o'tkaza olmaysiz!"); return; }

        let me = JSON.parse(localStorage.getItem('u_' + myEmail));
        let target = JSON.parse(localStorage.getItem('u_' + toEmail));

        if(!target) { alert("Qabul qiluvchi topilmadi!"); return; }
        if(me.balance < amt) { alert("Balansda pul yetarli emas!"); return; }

        me.balance -= amt;
        target.balance += amt;

        localStorage.setItem('u_' + myEmail, JSON.stringify(me));
        localStorage.setItem('u_' + toEmail, JSON.stringify(target));

        document.getElementById('u-balance').innerText = me.balance.toFixed(2) + " $";

        // Telegram bildirishnoma
        sendTelegramNotification(`💸 <b>O'tkazma!</b>\n📤 Kimdan: ${me.email}\n📥 Kimga: ${target.email}\n💵 Summa: ${amt}$`);

        alert(`${amt}$ jo'natildi!`);
        closeModal('transfer-modal');
    }

    function logout() {
        localStorage.removeItem('active_email');
        openScreen('welcome-screen');
    }
</script>
