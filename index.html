<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURAE CRYPTO</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Grafik uchun Chart.js kutubxonasi -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121922;
            color: #ffffff;
            margin: 0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .coin-icon {
            width: 44px;
            height: 44px;
            background: #248bfa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .coin-title {
            font-size: 18px;
            font-weight: 600;
        }
        .price {
            font-size: 32px;
            font-weight: 700;
            margin: 4px 0;
        }
        .change-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .up { color: #2bc155; }
        .down { color: #ff5959; }

        /* Grafik joyi */
        .chart-container {
            position: relative;
            height: 180px;
            width: 100%;
            margin-bottom: 15px;
        }

        /* Taymer/Period tugmalari */
        .time-buttons {
            display: flex;
            justify-content: space-between;
            background: #1c2733;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .time-btn {
            background: transparent;
            border: none;
            color: #708499;
            padding: 8px 12px;
            font-weight: 600;
            border-radius: 8px;
            font-size: 13px;
        }
        .time-btn.active {
            background: #2b394a;
            color: #ffffff;
        }

        /* Tugmalar */
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
        }
        .btn-buy { background: #248bfa; }
        .btn-sell { background: #248bfa; }
    </style>
</head>
<body>

    <div class="header">
        <div class="coin-icon">💎</div>
        <div>
            <div class="coin-title">Toncoin (TON)</div>
        </div>
    </div>

    <!-- Narx va foiz -->
    <div class="price" id="current-price">...</div>
    <div class="change-tag" id="price-change">
        <span id="change-val">...</span>
        <span style="color: #708499;">Bugun</span>
    </div>

    <!-- Grafik Canvas -->
    <div class="chart-container">
        <canvas id="cryptoChart"></canvas>
    </div>

    <!-- Taymer tugmalari -->
    <div class="time-buttons">
        <button class="time-btn active">1K</button>
        <button class="time-btn">1H</button>
        <button class="time-btn">1 Oy</button>
        <button class="time-btn">1Y</button>
        <button class="time-btn">All</button>
    </div>

    <!-- Sotib olish / Sotish -->
    <div class="action-buttons">
        <button class="btn btn-buy">Sotib olish</button>
        <button class="btn btn-sell">Sotish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cryptoChart;

        // Dynamic Chart yaratish funksiyasi
        function renderChart(prices) {
            const ctx = document.getElementById('cryptoChart').getContext('2d');
            
            // Yashil gradiyent soya
            const gradient = ctx.createLinearGradient(0, 0, 0, 180);
            gradient.addColorStop(0, 'rgba(43, 193, 85, 0.3)');
            gradient.addColorStop(1, 'rgba(43, 193, 85, 0.0)');

            if (cryptoChart) cryptoChart.destroy();

            cryptoChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: prices.map(() => ''), // x o'qidagi yozuvlarni yashirish
                    datasets: [{
                        data: prices,
                        borderColor: '#2bc155',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false }
                    }
                }
            });
        }

        // Real API ma'lumotlarini olish
        async function loadTONData() {
            try {
                // Hozirgi narx
                const priceRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd&include_24hr_change=true');
                const priceData = await priceRes.json();
                
                const ton = priceData['the-open-network'];
                document.getElementById('current-price').innerText = ton.usd.toLocaleString() + ' $';
                
                const change = ton.usd_24h_change.toFixed(2);
                const changeEl = document.getElementById('change-val');
                
                if (change >= 0) {
                    changeEl.innerHTML = `▲ +${change}%`;
                    changeEl.className = 'up';
                } else {
                    changeEl.innerHTML = `▼ ${change}%`;
                    changeEl.className = 'down';
                }

                // Chart uchun 1 kunlik narxlar tarixi
                const chartRes = await fetch('https://api.coingecko.com/api/v3/coins/the-open-network/market_chart?vs_currency=usd&days=1');
                const chartData = await chartRes.json();
                
                const prices = chartData.prices.map(p => p[1]);
                renderChart(prices);

            } catch (err) {
                console.log("Xato:", err);
            }
        }

        loadTONData();
    </script>
</body>
</html>
