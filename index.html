<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Auto-Poster Bot</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        h2 {
            color: #38bdf8;
            font-size: 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        input:focus {
            border-color: #38bdf8;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-start {
            background-color: #0284c7;
            color: #ffffff;
        }
        .btn-start:disabled {
            background-color: #334155;
            cursor: not-allowed;
        }
        .btn-stop {
            background-color: #ef4444;
            color: #ffffff;
            margin-top: 8px;
        }
        .status-card {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-size: 13px;
        }
        .status-title {
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .status-value {
            font-weight: bold;
            color: #4ade80;
        }
        .log-box {
            background-color: #050b14;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #cbd5e1;
            height: 80px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 TON Auto-Poster</h2>

    <div class="form-group">
        <label for="bot-token">Bot Token (BotFather'dan):</label>
        <input type="text" id="bot-token" placeholder="8208919639:AAGT..." />
    </div>

    <div class="form-group">
        <label for="channel-id">Kanal Username yoki Chat ID:</label>
        <input type="text" id="channel-id" placeholder="@my_crypto_channel" />
    </div>

    <button id="start-btn" class="btn btn-start" onclick="startPosting()">Avto-postni Boshlash 🚀</button>
    <button id="stop-btn" class="btn btn-stop" onclick="stopPosting()" style="display: none;">To'xtatish 🛑</button>

    <div class="status-card">
        <div class="status-title">Status: <span id="bot-status" style="color: #ef4444;">To'xtatilgan</span></div>
        <div class="status-title">Oxirgi TON Narxi: <span id="last-price" class="status-value">----</span></div>
    </div>

    <div class="log-box" id="log-box">
        [Tizim] Tayyor. Ma'lumotlarni kiriting va boshlang.
    </div>
</div>

<script>
    let timerId = null;

    function log(message) {
        const logBox = document.getElementById('log-box');
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<br>[${time}] ${message}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function fetchTonPrice() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd&include_24hr_change=true');
            const data = await res.json();
            
            const price = data['the-open-network'].usd;
            const change = data['the-open-network'].usd_24h_change;

            return { price, change };
        } catch (e) {
            log('❌ Narxni olishda xatolik yuz berdi!');
            return null;
        }
    }

    async function sendPost() {
        const token = document.getElementById('bot-token').value.trim();
        const channel = document.getElementById('channel-id').value.trim();

        if (!token || !channel) {
            alert('Iltimos, Bot Token va Kanal nomini kiriting!');
            stopPosting();
            return;
        }

        log('⌛ TON narxi yuklanmoqda...');
        const priceData = await fetchTonPrice();

        if (priceData) {
            const icon = priceData.change >= 0 ? '📈' : '📉';
            document.getElementById('last-price').innerText = `$${priceData.price} (${priceData.change.toFixed(2)}%)`;

            const messageText = 
                `💎 <b>TON Coin Narxi</b>\n\n` +
                `💵 Narx: <b>$${priceData.price} USD</b>\n` +
                `${icon} 24h O'zgarish: <b>${priceData.change.toFixed(2)}%</b>\n\n` +
                `⏰ <i>Har daqiqada yangilanadi</i>`;

            try {
                const url = `https://api.telegram.org/bot${token}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: channel,
                        text: messageText,
                        parse_mode: 'HTML'
                    })
                });

                const result = await response.json();

                if (result.ok) {
                    log('✅ Kanalga post jo'natildi!');
                } else {
                    log(`❌ Xatolik: ${result.description}`);
                }
            } catch (err) {
                log('❌ Telegram API bilan bog\'lanishda xatolik!');
            }
        }
    }

    function startPosting() {
        const token = document.getElementById('bot-token').value.trim();
        const channel = document.getElementById('channel-id').value.trim();

        if (!token || !channel) {
            alert('Bot token va kanal ID-sini kiriting!');
            return;
        }

        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';
        document.getElementById('bot-status').innerText = 'Ishlamoqda...';
        document.getElementById('bot-status').style.color = '#4ade80';

        log('🚀 Avto-post berish boshlandi.');
        
        // Darhol birinchi postni yuborish
        sendPost();

        // Har 60 soniyada (1 daqiqada) takrorlash
        timerId = setInterval(sendPost, 60000);
    }

    function stopPosting() {
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
        }

        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('bot-status').innerText = 'To\'xtatilgan';
        document.getElementById('bot-status').style.color = '#ef4444';

        log('🛑 Avto-post to\'xtatildi.');
    }
</script>

</body>
</html>
