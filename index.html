<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURAE CRYPTO</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .crypto-list {
            margin-top: 20px;
        }
        .crypto-box {
            background: #2a2a2a;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }
        .crypto-box:active {
            background: #333333;
        }
        .crypto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }
        .crypto-name {
            font-weight: bold;
            font-size: 16px;
        }
        .crypto-price {
            font-weight: bold;
            font-size: 16px;
        }
        /* Bosilganda ochiladigan qism */
        .crypto-details {
            display: none; /* Boshida yashirin turadi */
            background: #1e1e1e;
            padding: 10px 15px;
            font-size: 14px;
            text-align: left;
            border-top: 1px solid #333;
        }
        .up { color: #00ff88; } /* Ko'tarilsa yashil */
        .down { color: #ff4d4d; } /* Tushsa qizil */
    </style>
</head>
<body>

    <h2>⚡️ TURAE CRYPTO</h2>
    
    <div class="card">
        <p id="user-info">Yuklanmoqda...</p>
    </div>

    <div class="crypto-list">
        <h3>📊 Bozor narxlari (Bosing 👇)</h3>
        
        <!-- TON -->
        <div class="crypto-box" onclick="toggleDetails('ton-details')">
            <div class="crypto-item">
                <span class="crypto-name">💎 TON</span>
                <span class="crypto-price" id="ton-price">...</span>
            </div>
            <div class="crypto-details" id="ton-details">
                24 soatlik o'zgarish: <span id="ton-change">...</span>
            </div>
        </div>
        
        <!-- BTC -->
        <div class="crypto-box" onclick="toggleDetails('btc-details')">
            <div class="crypto-item">
                <span class="crypto-name">🟧 BTC</span>
                <span class="crypto-price" id="btc-price">...</span>
            </div>
            <div class="crypto-details" id="btc-details">
                24 soatlik o'zgarish: <span id="btc-change">...</span>
            </div>
        </div>
        
        <!-- ETH -->
        <div class="crypto-box" onclick="toggleDetails('eth-details')">
            <div class="crypto-item">
                <span class="crypto-name">🔷 ETH</span>
                <span class="crypto-price" id="eth-price">...</span>
            </div>
            <div class="crypto-details" id="eth-details">
                24 soatlik o'zgarish: <span id="eth-change">...</span>
            </div>
        </div>
    </div>

    <script>
        // Telegram foydalanuvchisi
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-info').innerText = "Salom, " + tg.initDataUnsafe.user.first_name + "! 👋";
        }

        // Bosilganda ma'lumotni ochib-yopuvchi funksiya
        function toggleDetails(id) {
            const el = document.getElementById(id);
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                el.style.display = "block";
            }
        }

        // API dan narx va 24s o'zgarishni olish
        async function fetchPrices() {
            try {
                // include_24hr_change=true qo'shildi
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network,bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();

                updateCryptoUI('ton', data['the-open-network']);
                updateCryptoUI('btc', data['bitcoin']);
                updateCryptoUI('eth', data['ethereum']);
            } catch (err) {
                console.log("Xato:", err);
            }
        }

        function updateCryptoUI(id, coinData) {
            // Narxni yozish
            document.getElementById(`${id}-price`).innerText = '$' + coinData.usd.toLocaleString();
            
            // O'zgarishni yozish
            const changeSpan = document.getElementById(`${id}-change`);
            const changeValue = coinData.usd_24h_change.toFixed(2); // verguldan keyin 2 ta raqam
            
            if (changeValue > 0) {
                changeSpan.innerText = '📈 +' + changeValue + '%';
                changeSpan.className = 'up';
            } else {
                changeSpan.innerText = '📉 ' + changeValue + '%';
                changeSpan.className = 'down';
            }
        }

        fetchPrices();
    </script>
</body>
</html>
