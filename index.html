<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAZ Ecosystem & Token</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin: 0 auto 16px;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.4);
        }
        h1 {
            color: #f0f6fc;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .rates-card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .rates-card h3 {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .rate-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .rate-item:last-child {
            margin-bottom: 0;
        }
        .crypto-name {
            font-weight: 600;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #238636;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            margin-bottom: 12px;
        }
        .btn:hover {
            background: #2ea043;
        }
        .btn-secondary {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .btn-secondary:hover {
            background: #30363d;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #484f58;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">TAZ</div>
    <h1>TAZ Ecosystem</h1>
    <p class="subtitle">Vazifalarni bajaring, TAZ ishlang va uni USDT, TON, BTC, ETH ga almashtiring!</p>

    <div class="rates-card">
        <h3>🪙 Boshlang'ich Kurslar</h3>
        <div class="rate-item">
            <span class="crypto-name">1 TAZ</span>
            <span>0.1 USDT</span>
        </div>
        <div class="rate-item">
            <span class="crypto-name">1 TAZ</span>
            <span>0.02 TON</span>
        </div>
        <div class="rate-item">
            <span class="crypto-name">1 TAZ</span>
            <span>0.000001 BTC</span>
        </div>
        <div class="rate-item">
            <span class="crypto-name">1 TAZ</span>
            <span>0.00003 ETH</span>
        </div>
    </div>

    <!-- Bu yerga telegram botingiz username'ini yozing -->
    <a href="https://t.me/SIZNING_BOT_USERNAME" class="btn" target="_blank">🚀 Telegram Botda Boshlash</a>
    <a href="https://t.me/SIZNING_ADMIN_USERNAME" class="btn btn-secondary" target="_blank">👨‍💻 Admin Bilan Bog'lanish</a>

    <div class="footer">
        © 2026 TAZ Ecosystem. Barcha huquqlar himoyalangan.
    </div>
</div>

</body>
</html>
